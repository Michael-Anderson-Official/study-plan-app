  <style>
    /* 全体のスタイル */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #fdfdfd;
      color: #333;
    }
    h1 {
      margin: 0;
      padding: 1rem;
      font-size: 1.3rem;
      background-color: #f0f8ff;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #ccc;
    }
    thead th {
      background: #e8f4ff;
      font-weight: bold;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    tbody th.row-label {
      background: #f5f5f5;
      text-align: center;
      position: sticky;
      left: 0;
      z-index: 5;
    }
    /* セルのスタイル */
    .cell {
      height: 60px;
      position: relative;
      overflow: hidden;
    }
    .cell .section {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      padding: 2px;
      box-sizing: border-box;
      overflow: auto;
      font-size: 0.75rem;
    }
    .cell .prep {
      top: 0;
      border-bottom: 1px solid #ccc;
      background: #fff;
    }
    .cell .review {
      bottom: 0;
      background: #fafafa;
    }
    .cell .section:focus {
      outline: 2px solid #1e90ff;
    }
    /* ヘッダー名編集のスタイル */
    .header-cell {
      background: #e8f4ff;
    }
    .header-cell[contenteditable] {
      cursor: text;
    }
    .header-cell:focus {
      outline: 2px solid #1e90ff;
    }
    /* ボタン */
    .controls {
      margin: 1rem;
      text-align: center;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background: #1e90ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0c78d5;
    }
    @media (max-width: 600px) {
      .cell {
        height: 80px;
      }
      .cell .section {
        font-size: 0.65rem;
      }
    }
  </style>
</head>

    「一週間をリセット」ボタンを押すと、このページに保存されたすべての記録が消去されます。

  <script>
    // 保存および読み込み
    document.addEventListener('DOMContentLoaded', function () {
      // ヘッダー名の読み込み
      document.querySelectorAll('.header-cell').forEach(function (cell) {
        var key = 'header-' + cell.getAttribute('data-header');
        var saved = localStorage.getItem(key);
        if (saved) cell.textContent = saved;
        cell.addEventListener('input', function () {
          localStorage.setItem(key, cell.textContent);
        });
      });
      // 各日付行ラベルの読み込み
      document.querySelectorAll('tbody th.row-label').forEach(function (label) {
        var key = 'daylabel-' + label.getAttribute('data-day');
        var saved = localStorage.getItem(key);
        if (saved) label.textContent = saved;
        label.addEventListener('input', function () {
          localStorage.setItem(key, label.textContent);
        });
      });
      // セルの内容読み込み
      document.querySelectorAll('.section').forEach(function (section) {
        var key = section.getAttribute('data-key');
        var saved = localStorage.getItem(key);
        if (saved) section.innerText = saved;
        section.addEventListener('input', function () {
          localStorage.setItem(key, section.innerText);
        });
      });
    });
    // リセットボタン
    document.getElementById('resetButton').addEventListener('click', function () {
      if (confirm('本当にこの週間の記録を削除しますか？')) {
        // 全てのキーに対して削除
        document.querySelectorAll('.section').forEach(function (section) {
          var key = section.getAttribute('data-key');
          localStorage.removeItem(key);
          section.innerText = '';
        });
        document.querySelectorAll('.header-cell').forEach(function (cell) {
          var key = 'header-' + cell.getAttribute('data-header');
          localStorage.removeItem(key);
          // 初期値に戻す
          var idx = cell.getAttribute('data-header');
          if (idx === 'sub8') {
            cell.textContent = '感想・振り返り';
          } else {
            var num = idx.replace('sub', '');
            cell.textContent = '科目' + num;
          }
        });
        document.querySelectorAll('tbody th.row-label').forEach(function (label) {
          var key = 'daylabel-' + label.getAttribute('data-day');
          localStorage.removeItem(key);
          // デフォルトの曜日頭文字へ
          var defaults = {day1:'月',day2:'火',day3:'水',day4:'木',day5:'金',day6:'土',day7:'日'};
          label.textContent = defaults[label.getAttribute('data-day')];
        });
        alert('記録をリセットしました。');
      }
    });
  </script>
