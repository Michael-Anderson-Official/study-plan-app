<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>計画帳アプリ</title>
  <style>
    /* 全体のスタイル */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #fdfdfd;
      color: #333;
    }
    h1 {
      margin: 0;
      padding: 1rem;
      font-size: 1.3rem;
      background-color: #f0f8ff;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #ccc;
    }
    thead th {
      background: #e8f4ff;
      font-weight: bold;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    tbody th.row-label {
      background: #f5f5f5;
      text-align: center;
      position: sticky;
      left: 0;
      z-index: 5;
    }
    /* セルのスタイル */
    .cell {
      height: 60px;
      position: relative;
      overflow: hidden;
    }
    .cell .section {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      padding: 2px;
      box-sizing: border-box;
      overflow: auto;
      font-size: 0.75rem;
    }
    .cell .prep {
      top: 0;
      border-bottom: 1px solid #ccc;
      background: #fff;
    }
    .cell .review {
      bottom: 0;
      background: #fafafa;
    }
    .cell .section:focus {
      outline: 2px solid #1e90ff;
    }
    /* ヘッダー名編集のスタイル */
    .header-cell {
      background: #e8f4ff;
    }
    .header-cell[contenteditable] {
      cursor: text;
    }
    .header-cell:focus {
      outline: 2px solid #1e90ff;
    }
    /* ボタン */
    .controls {
      margin: 1rem;
      text-align: center;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background: #1e90ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0c78d5;
    }
    @media (max-width: 600px) {
      .cell {
        height: 80px;
      }
      .cell .section {
        font-size: 0.65rem;
      }
    }
  </style>
</head>

    各セルは上半分が「予習欄」、下半分が「復習欄」です。<br />
    ヘッダーの科目名はクリックして変更できます。記入内容はスマートフォンのブラウザに保存されるので、ページを再読み込みしても内容が残ります。<br />
    「一週間をリセット」ボタンを押すと、このページに保存されたすべての記録が消去されます。

    <h2 style="font-size:1rem; margin-bottom:0.5rem;">教材追加欄</h2>
    <input id="materialInput" type="text" placeholder="教材名を入力" style="padding:0.4rem; width: 60%; max-width:280px;" />
    <button id="addMaterialBtn" style="padding:0.4rem 0.8rem; margin-left:0.5rem;">追加</button>

  <!-- 一週間の振り返り欄 -->

    <h2 style="font-size:1rem; margin-bottom:0.5rem;">一週間の振り返り</h2>
    <div id="weeklySummary" contenteditable style="border: 1px solid #ccc; padding: 0.5rem; min-height: 80px;"></div>
  </div>
  <script>
    // 保存および読み込み
    document.addEventListener('DOMContentLoaded', function () {
      // ヘッダー名の読み込み
      document.querySelectorAll('.header-cell').forEach(function (cell) {
        var key = 'header-' + cell.getAttribute('data-header');
        var saved = localStorage.getItem(key);
        if (saved) cell.textContent = saved;
        cell.addEventListener('input', function () {
          localStorage.setItem(key, cell.textContent);
        });
      });

      // 教材リストの読み込みとUI更新
      var materialsList = [];
      function loadMaterials() {
        var saved = localStorage.getItem('materials-list');
        if (saved) {
          try {
            materialsList = JSON.parse(saved);
          } catch (e) {
            materialsList = [];
          }
        }
        updateMaterialsUI();
      }
      function updateMaterialsUI() {
        // ヘッダーセルの更新
        document.querySelectorAll('.header-cell').forEach(function (cell) {
          var idxStr = cell.getAttribute('data-header');
          if (!idxStr) return;
          var idx = parseInt(idxStr.replace('sub', ''), 10) - 1;
          if (materialsList[idx]) {
            cell.textContent = materialsList[idx];
          }
        });
        // リスト表示の更新
        var listEl = document.getElementById('materialsList');
        if (listEl) {
          listEl.innerHTML = '';
          materialsList.forEach(function (mat, i) {
            var li = document.createElement('li');
            li.textContent = (i + 1) + '. ' + mat;
            listEl.appendChild(li);
          });
        }
      }
      // 教材追加ボタンイベント
      var addBtn = document.getElementById('addMaterialBtn');
      if (addBtn) {
        addBtn.addEventListener('click', function () {
          var input = document.getElementById('materialInput');
          if (!input) return;
          var name = input.value.trim();
          if (!name) return;
          materialsList.push(name);
          localStorage.setItem('materials-list', JSON.stringify(materialsList));
          updateMaterialsUI();
          input.value = '';
        });
      }

      // ページ読み込み時に教材リストを読み込む
      loadMaterials();
      // 各行の日付を動的に設定します。週の開始日（月曜日）を求め、その週に含まれる7日分の日付を計算します。
      const currentDate = new Date();
      const currentDay = currentDate.getDay();
      // JavaScriptでは日曜が0、月曜が1...土曜が6
      const diffToMonday = (currentDay + 6) % 7;
      const monday = new Date(currentDate);
      monday.setDate(currentDate.getDate() - diffToMonday);
      // グローバルに保存してリセット時に使う
      window.currentWeekStartISO = monday.toISOString().split('T')[0];
      // 2026年の日本の祝日一覧。赤字表示の対象となります。
      const holidays2026 = new Set([
        '2026-01-01', // 元日
        '2026-01-12', // 成人の日
        '2026-02-11', // 建国記念の日
        '2026-02-23', // 天皇誕生日
        '2026-03-20', // 春分の日
        '2026-04-29', // 昭和の日
        '2026-05-04', // みどりの日
        '2026-05-05', // こどもの日
        '2026-05-06', // 憲法記念日の振替休日
        '2026-07-20', // 海の日
        '2026-08-11', // 山の日
        '2026-09-21', // 敬老の日
        '2026-09-22', // 国民の休日（シルバーウィーク）
        '2026-09-23', // 秋分の日
        '2026-10-12', // スポーツの日
        '2026-11-03', // 文化の日
        '2026-11-23'  // 勤労感謝の日
      ]);
      const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
      // 行ごとに処理
      const rows = document.querySelectorAll('tbody tr');
      rows.forEach(function (row, index) {
        const date = new Date(monday);
        date.setDate(monday.getDate() + index);
        const iso = date.toISOString().split('T')[0];
        const display = (date.getMonth() + 1) + '/' + date.getDate();
        const dayName = dayNames[date.getDay()];
        const labelCell = row.querySelector('th.row-label');
        // 日付の表示と曜日をリンクさせる
        labelCell.textContent = dayName + ' ' + display;
        // 色分け：日曜日または祝日は赤、土曜日は青、それ以外はデフォルト
        if (date.getDay() === 0 || holidays2026.has(iso)) {
          labelCell.style.color = 'red';
        } else if (date.getDay() === 6) {
          labelCell.style.color = 'blue';
        } else {
          labelCell.style.color = '';
        }
        // 各科目セルの data-key を日付ベースに更新
        const cells = row.querySelectorAll('td.cell');
        cells.forEach(function (cell, cellIndex) {
          const subNum = cellIndex + 1;
          const prepSection = cell.querySelector('.prep');
          const reviewSection = cell.querySelector('.review');
          prepSection.setAttribute('data-key', iso + '-sub' + subNum + '-prep');
          reviewSection.setAttribute('data-key', iso + '-sub' + subNum + '-review');
        });
      });
      // セルの内容読み込み
      document.querySelectorAll('.section').forEach(function (section) {
        // data-key は上で日付ベースに更新されているためここで取得
        var key = section.getAttribute('data-key');
        var saved = localStorage.getItem(key);
        if (saved) section.innerText = saved;
        section.addEventListener('input', function () {
          // 常に現在の key で保存する
          localStorage.setItem(section.getAttribute('data-key'), section.innerText);
        });
      });

      // 一週間の振り返り欄の読み込みと保存
      var weeklySummaryKey = 'weekly-summary-' + window.currentWeekStartISO;
      var weeklySummaryEl = document.getElementById('weeklySummary');
      if (weeklySummaryEl) {
        var weeklySaved = localStorage.getItem(weeklySummaryKey);
        if (weeklySaved) weeklySummaryEl.innerText = weeklySaved;
        weeklySummaryEl.addEventListener('input', function () {
          localStorage.setItem(weeklySummaryKey, weeklySummaryEl.innerText);
        });
      }
    });
    // リセットボタン
    document.getElementById('resetButton').addEventListener('click', function () {
      if (confirm('本当にこの週間の記録を削除しますか？')) {
        // 全てのキーに対して削除
        document.querySelectorAll('.section').forEach(function (section) {
          var key = section.getAttribute('data-key');
          localStorage.removeItem(key);
          section.innerText = '';
        });
        document.querySelectorAll('.header-cell').forEach(function (cell) {
          var key = 'header-' + cell.getAttribute('data-header');
          localStorage.removeItem(key);
          // 初期値に戻す
          var idx = cell.getAttribute('data-header');
          if (idx === 'sub8') {
            cell.textContent = '感想・振り返り';
          } else {
            var num = idx.replace('sub', '');
            cell.textContent = '科目' + num;
          }
        });
        // 教材リストの削除
        localStorage.removeItem('materials-list');
        // 教材リスト表示をクリア
        var listEl = document.getElementById('materialsList');
        if (listEl) listEl.innerHTML = '';
        // 一週間の振り返りの削除
        var summaryKey = 'weekly-summary-' + window.currentWeekStartISO;
        localStorage.removeItem(summaryKey);
        var summaryEl = document.getElementById('weeklySummary');
        if (summaryEl) summaryEl.innerText = '';
        alert('記録をリセットしました。');
      }
    });
  </script>
</body>
</html>
