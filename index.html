<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>計画帳アプリ</title>
  <style>
    /* 全体のスタイル */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #fdfdfd;
      color: #333;
    }
    h1 {
      margin: 0;
      padding: 1rem;
      font-size: 1.3rem;
      background-color: #f0f8ff;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #ccc;
    }
    thead th {
      background: #e8f4ff;
      font-weight: bold;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    tbody th.row-label {
      background: #f5f5f5;
      text-align: center;
      position: sticky;
      left: 0;
      z-index: 5;
    }
    /* セルのスタイル */
    .cell {
      height: 76px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* 完了状況（○×）の表示専用行。1週間タブのセルに常時表示される */
    .cell .status-row {
      flex: 0 0 auto;
      height: 18px;
      line-height: 18px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: bold;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
    }
    .cell .status-row.status-circle {
      color: #2e8b57;
    }
    .cell .status-row.status-cross {
      color: #d9534f;
    }
    .cell .section {
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
      padding: 2px;
      box-sizing: border-box;
      overflow: auto;
      font-size: 0.75rem;
    }
    .cell .prep {
      border-bottom: 1px solid #ccc;
      background: #fff;
    }
    .cell .review {
      background: #fafafa;
    }
    /* 予習・復習欄であることが分かるようにラベルを表示する（編集内容には含まれない） */
    .cell .prep::before {
      content: "予習";
      display: block;
      font-size: 0.6rem;
      font-weight: bold;
      color: #1e90ff;
      line-height: 1.2;
    }
    .cell .review::before {
      content: "復習";
      display: block;
      font-size: 0.6rem;
      font-weight: bold;
      color: #888;
      line-height: 1.2;
    }
    .cell .section:focus {
      outline: 2px solid #1e90ff;
    }
    /* ヘッダー名編集のスタイル */
    .header-cell {
      background: #e8f4ff;
    }
    .header-cell[contenteditable] {
      cursor: text;
    }
    .header-cell:focus {
      outline: 2px solid #1e90ff;
    }
    /* 今日の日付行の強調表示 */
    .row-label.today {
      background-color: #fff8c6; /* 薄い黄色でハイライト */
      font-weight: bold;
    }
    /* ボタン */
    .controls {
      margin: 1rem;
      text-align: center;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background: #1e90ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0c78d5;
    }
    /* 表示切り替えタブ */
    .view-tabs {
      text-align: center;
      padding: 0.6rem 0;
      background: #f0f8ff;
      border-bottom: 1px solid #ccc;
    }
    .tab-btn {
      background: #fff;
      color: #1e90ff;
      border: 1px solid #1e90ff;
      border-radius: 4px;
      padding: 0.5rem 1.2rem;
      margin: 0 0.3rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #1e90ff;
      color: #fff;
    }
    /* 今日やることタブ: 教材リストと○×ボタン */
    #todayTaskList {
      list-style: none;
      padding: 0;
      max-width: 480px;
      margin: 0 auto;
      text-align: left;
    }
    #todayTaskList li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.6rem 0.4rem;
      border-bottom: 1px solid #eee;
    }
    #todayTaskList li.today-empty {
      justify-content: center;
      color: #888;
    }
    .today-task-text {
      flex: 1;
    }
    .status-btn {
      width: 2rem;
      height: 2rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
      padding: 0;
    }
    .status-btn.circle.selected {
      background: #2e8b57;
      border-color: #2e8b57;
      color: #fff;
    }
    .status-btn.cross.selected {
      background: #d9534f;
      border-color: #d9534f;
      color: #fff;
    }
    @media (max-width: 600px) {
      .cell {
        height: 98px;
      }
      .cell .section {
        font-size: 0.65rem;
      }
    }
  </style>
</head>

    各セルは上半分が「予習欄」、下半分が「復習欄」です。<br />
    ヘッダーの科目名はクリックして変更できます。記入内容はスマートフォンのブラウザに保存されるので、ページを再読み込みしても内容が残ります。<br />
    「一週間をリセット」ボタンを押すと、このページに保存されたすべての記録が消去されます。
  </p>

  <!-- 教材追加欄 -->

    <button id="addMaterialBtn" type="button" style="padding:0.4rem 0.8rem; margin-left:0.5rem;">追加</button>
    <ul id="materialsList" style="list-style:none; padding-left:0; margin-top:0.5rem;"></ul>
  </div>

  <!-- 教材の詳細入力欄 -->
  <div id="materialDetail" style="display:none; margin:1rem; padding:1rem; border:1px solid #ccc; border-radius:4px; background:#f9f9f9;">
    <h3 id="materialNameDetail" style="font-size:1rem; margin-top:0;">教材詳細</h3>
    <div style="margin-bottom:0.5rem;">
      <label for="unitsInput">単位数（章数やページ数など）:</label><br/>
      <input id="unitsInput" type="number" min="1" style="padding:0.3rem; width:60%; max-width:200px;" />
    </div>
    <div style="margin-bottom:0.5rem;">
      <label for="targetDateInput">目標期日:</label><br/>
      <input id="targetDateInput" type="date" style="padding:0.3rem; width:60%; max-width:200px;" />
    </div>
    <div style="margin-bottom:0.5rem;">
      <label for="dailyGoalInput">一日あたりの目標単位数（任意）:</label><br/>
      <input id="dailyGoalInput" type="number" min="1" style="padding:0.3rem; width:60%; max-width:200px;" />
    </div>
    <!-- 目次入力欄: ユーザーが各章タイトルを1行ごとに入力できるようにする -->
    <div style="margin-bottom:0.5rem;">
      <!-- 目次や単位を自由に入力できる欄。各行ごとに1項目を入力する。 -->
      <label for="tocInput">目次／単位リスト（各行に1項目）:</label><br/>
      <textarea id="tocInput" rows="5" style="padding:0.3rem; width:90%; max-width:400px;"></textarea>
    </div>
    <button id="saveDetailBtn" type="button" style="padding:0.4rem 0.8rem; margin-right:0.5rem;">保存</button>
    <button id="dailyScheduleBtn" type="button" style="padding:0.4rem 0.8rem; margin-right:0.5rem;">毎日</button>
    <button id="deleteMaterialBtn" type="button" style="padding:0.4rem 0.8rem; margin-right:0.5rem; background:#d9534f;">削除</button>
    <button id="cancelDetailBtn" type="button" style="padding:0.4rem 0.8rem;">キャンセル</button>
  </div>

  <!-- 一週間の振り返り欄 -->
  <div class="weekly-summary-container" style="margin: 1rem;">
    <h2 style="font-size:1rem; margin-bottom:0.5rem;">一週間の振り返り</h2>
    <div id="weeklySummary" contenteditable style="border: 1px solid #ccc; padding: 0.5rem; min-height: 80px;"></div>
  </div>
  </div>
  <script>
    // グローバル変数の定義
    // 教材リストや詳細情報、現在選択中の教材インデックスはグローバルで管理します。
    var materialsList = [];
    var materialsDetails = [];
    var currentMaterialIndex = null;

    // 2026年の日本の祝日一覧。赤字表示の対象となります。
    const holidays2026 = new Set([
        '2026-01-01', // 元日
        '2026-01-12', // 成人の日
        '2026-02-11', // 建国記念の日
        '2026-02-23', // 天皇誕生日
        '2026-03-20', // 春分の日
        '2026-04-29', // 昭和の日
        '2026-05-04', // みどりの日
        '2026-05-05', // こどもの日
        '2026-05-06', // 憲法記念日の振替休日
        '2026-07-20', // 海の日
        '2026-08-11', // 山の日
        '2026-09-21', // 敬老の日
        '2026-09-22', // 国民の休日（シルバーウィーク）
        '2026-09-23', // 秋分の日
        '2026-10-12', // スポーツの日
        '2026-11-03', // 文化の日
        '2026-11-23'  // 勤労感謝の日
    ]);
    // 曜日名
    const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
    // テーブル行要素をキャッシュ
    const rows = document.querySelectorAll('tbody tr');

    // 指定した日時をローカルタイムゾーンの ISO YYYY-MM-DD 形式に変換するヘルパー
    function toLocalISO(date) {
      var y = date.getFullYear();
      var m = (date.getMonth() + 1).toString().padStart(2, '0');
      var d = date.getDate().toString().padStart(2, '0');
      return y + '-' + m + '-' + d;
    }

    // YYYY-MM-DD 形式の ISO 日付文字列をローカルタイムゾーンの日付オブジェクトに変換するヘルパー
    // 文字列を Date() に直接渡すと UTC とみなされ日付がずれてしまうことがあるため、
    // 分割して year/month/day を指定して生成する
    function parseISOToDate(iso) {
      if (!iso) return new Date();
      var parts = iso.split('-');
      var y = parseInt(parts[0], 10);
      var m = parseInt(parts[1], 10) - 1;
      var d = parseInt(parts[2], 10);
      return new Date(y, m, d);
    }

    // 保存および読み込み
    // DOMContentLoaded イベントを待たずに即時実行します。
      // ヘッダー名の読み込み
      document.querySelectorAll('.header-cell').forEach(function (cell) {
        var key = 'header-' + cell.getAttribute('data-header');
        var saved = localStorage.getItem(key);
        if (saved) cell.textContent = saved;
        cell.addEventListener('input', function () {
          localStorage.setItem(key, cell.textContent);
        });
      });

      // 予習・復習セルの入力内容を保存します。
      document.querySelectorAll('.section').forEach(function (section) {
        section.addEventListener('input', function () {
          var key = section.getAttribute('data-key');
          if (key) localStorage.setItem(key, section.innerText);
        });
      });

      // 各セルの先頭に、完了状況（○×）を表示する専用行を追加します。
      document.querySelectorAll('td.cell').forEach(function (cell) {
        var statusRow = document.createElement('div');
        statusRow.className = 'status-row';
        cell.insertBefore(statusRow, cell.firstChild);
      });

      // 教材リストおよび詳細情報はグローバル変数を使用します。
      function loadMaterials() {
        var saved = localStorage.getItem('materials-list');
        if (saved) {
          try {
            var parsedMaterials = JSON.parse(saved);
            materialsList = Array.isArray(parsedMaterials) ? parsedMaterials : [];
          } catch (e) {
            materialsList = [];
          }
        } else {
          materialsList = [];
        }

        // 詳細情報の読み込み
        var detailSaved = localStorage.getItem('material-details');
        if (detailSaved) {
          try {
            var parsedDetails = JSON.parse(detailSaved);
            materialsDetails = Array.isArray(parsedDetails) ? parsedDetails : [];
          } catch (e) {
            materialsDetails = [];
          }
        } else {
          materialsDetails = [];
        }
        // UIを更新
        updateMaterialsUI();
      }
      function updateMaterialsUI() {
        // ヘッダーセルの更新
        document.querySelectorAll('.header-cell').forEach(function (cell) {
          var idxStr = cell.getAttribute('data-header');
          if (!idxStr) return;
          var idx = parseInt(idxStr.replace('sub', ''), 10) - 1;
          if (materialsList[idx]) {
            cell.textContent = materialsList[idx];
          } else if (idxStr === 'sub8') {
            cell.textContent = '感想・振り返り';
          } else {
            cell.textContent = '科目' + (idx + 1);
          }
        });
        // リスト表示の更新
        var listEl = document.getElementById('materialsList');
        if (listEl) {
        listEl.innerHTML = '';
        materialsList.forEach(function (mat, i) {
            var li = document.createElement('li');
            // 番号と教材名を表示
            var nameSpan = document.createElement('span');
            nameSpan.textContent = (i + 1) + '. ' + mat;
            li.appendChild(nameSpan);
            // 詳細ボタンを作成し、リンク風のスタイルを適用
            var detailBtn = document.createElement('button');
            detailBtn.textContent = '詳細';
            detailBtn.setAttribute('data-index', i);
            detailBtn.style.marginLeft = '0.5rem';
            detailBtn.style.background = 'none';
            detailBtn.style.border = 'none';
            detailBtn.style.color = '#0066cc';
            detailBtn.style.textDecoration = 'underline';
            detailBtn.style.cursor = 'pointer';
            li.appendChild(detailBtn);
            listEl.appendChild(li);
          });
        }
      }
      // 教材追加ボタンイベント
      var addBtn = document.getElementById('addMaterialBtn');
      if (addBtn) {
        addBtn.addEventListener('click', function () {
          var input = document.getElementById('materialInput');
          if (!input) return;
          var name = input.value.trim();
          if (!name) return;
          materialsList.push(name);
          // 新しい教材の詳細を空で初期化（未設定の場合はnull）
          materialsDetails.push(null);
          localStorage.setItem('materials-list', JSON.stringify(materialsList));
          localStorage.setItem('material-details', JSON.stringify(materialsDetails));
          updateMaterialsUI();
          input.value = '';
        });
      }

      // ページ読み込み時に教材リストを読み込む
      loadMaterials();
      // ページ読み込み時: 現在の日付からその週の月曜日を計算し、
      // window.currentWeekStartISO に保存します。週の表示は updateWeekUI() で行います。
      (function initialiseWeek() {
        var currentDate = new Date();
        // 00:00:00 に設定
        currentDate.setHours(0, 0, 0, 0);
        // 保存されている週の始まり設定を読み込み。デフォルトは月曜始まり。
        var weekStartSetting = localStorage.getItem('weekStart') || 'monday';
        var dayOfWeek = currentDate.getDay();
        var diff;
        if (weekStartSetting === 'monday') {
          diff = (dayOfWeek + 6) % 7;
        } else {
          diff = dayOfWeek;
        }
        var startDate = new Date(currentDate);
        startDate.setDate(currentDate.getDate() - diff);
        window.currentWeekStartISO = toLocalISO(startDate);
        // セレクトボックスに週の始まり設定を反映
        var selectEl = document.getElementById('weekStartSelect');
        if (selectEl) {
          selectEl.value = weekStartSetting;
        }
        // UI を更新
        updateWeekUI();
        updateCellsForCurrentWeek();
      })();

      // 教材リスト内の詳細リンクをクリックしたときの処理（イベント委任）
      var materialsListEl = document.getElementById('materialsList');
      if (materialsListEl) {
        materialsListEl.addEventListener('click', function (event) {
          var target = event.target;
          // data-index 属性を持つ要素をクリックした場合に詳細を開く
          if (target && target.hasAttribute && target.hasAttribute('data-index')) {
            var idx = parseInt(target.getAttribute('data-index'), 10);
            openMaterialDetail(idx);
          }
        });
      }

      // 詳細保存ボタン
      var saveDetailBtn = document.getElementById('saveDetailBtn');
      if (saveDetailBtn) {
        saveDetailBtn.addEventListener('click', function () {
          saveMaterialDetail();
        });
      }
      // 教材削除ボタン
      var deleteMaterialBtn = document.getElementById('deleteMaterialBtn');
      if (deleteMaterialBtn) {
        deleteMaterialBtn.addEventListener('click', function () {
          deleteCurrentMaterial();
        });
      }
      // 詳細キャンセルボタン
      var cancelDetailBtn = document.getElementById('cancelDetailBtn');
      if (cancelDetailBtn) {
        cancelDetailBtn.addEventListener('click', function () {
          var detailDiv = document.getElementById('materialDetail');
          detailDiv.style.display = 'none';
        });
      }

      // 前週・次週ボタンのクリック処理
      var prevBtn = document.getElementById('prevWeekBtn');
      if (prevBtn) {
        prevBtn.addEventListener('click', function () {
          var start = parseISOToDate(window.currentWeekStartISO);
          start.setDate(start.getDate() - 7);
          window.currentWeekStartISO = toLocalISO(start);
          updateWeekUI();
          updateCellsForCurrentWeek();
        });
      }
      var nextBtn = document.getElementById('nextWeekBtn');
      if (nextBtn) {
        nextBtn.addEventListener('click', function () {
          var start = parseISOToDate(window.currentWeekStartISO);
          start.setDate(start.getDate() + 7);
          window.currentWeekStartISO = toLocalISO(start);
          updateWeekUI();
          updateCellsForCurrentWeek();
        });
      }

      // 今週に戻るボタンのクリック処理
      var currentWeekBtn = document.getElementById('currentWeekBtn');
      if (currentWeekBtn) {
        currentWeekBtn.addEventListener('click', function () {
          // 現在の日付から週の開始日を計算し currentWeekStartISO に設定
          var nowDate = new Date();
          nowDate.setHours(0, 0, 0, 0);
          var weekStartSettingNow = localStorage.getItem('weekStart') || 'monday';
          var dowNow = nowDate.getDay();
          var offsetNow = (weekStartSettingNow === 'monday') ? ((dowNow + 6) % 7) : dowNow;
          var startOfWeekNow = new Date(nowDate);
          startOfWeekNow.setDate(nowDate.getDate() - offsetNow);
          window.currentWeekStartISO = toLocalISO(startOfWeekNow);
          updateWeekUI();
          updateCellsForCurrentWeek();
        });
      }

      // 表示切り替えタブのクリック処理
      var weekTabBtn = document.getElementById('weekTabBtn');
      var todayTabBtn = document.getElementById('todayTabBtn');
      var weekView = document.getElementById('weekView');
      var todayView = document.getElementById('todayView');
      if (weekTabBtn && todayTabBtn && weekView && todayView) {
        weekTabBtn.addEventListener('click', function () {
          weekView.style.display = '';
          todayView.style.display = 'none';
          weekTabBtn.classList.add('active');
          todayTabBtn.classList.remove('active');
        });
        todayTabBtn.addEventListener('click', function () {
          weekView.style.display = 'none';
          todayView.style.display = '';
          todayTabBtn.classList.add('active');
          weekTabBtn.classList.remove('active');
          updateTodayView();
        });
      }

      // 毎日ボタンのクリック処理
      var dailyBtn = document.getElementById('dailyScheduleBtn');
      if (dailyBtn) {
        dailyBtn.addEventListener('click', function () {
          if (currentMaterialIndex === null) return;
          // 入力値を materialsDetails に保存
          var unitsInput = document.getElementById('unitsInput');
          var dailyGoalInput = document.getElementById('dailyGoalInput');
          var unitsVal = parseInt(unitsInput.value, 10);
          var dailyGoalVal = parseInt(dailyGoalInput.value, 10);
          if (!materialsDetails[currentMaterialIndex]) materialsDetails[currentMaterialIndex] = {};
          materialsDetails[currentMaterialIndex] = {
            units: isNaN(unitsVal) ? null : unitsVal,
            targetDate: null,
            dailyGoal: isNaN(dailyGoalVal) ? null : dailyGoalVal
          };
          localStorage.setItem('material-details', JSON.stringify(materialsDetails));
          scheduleMaterialDaily(currentMaterialIndex);
        });
      }

      // 週の始まり設定セレクトボックスの変更処理
      var weekStartSelect = document.getElementById('weekStartSelect');
      if (weekStartSelect) {
        weekStartSelect.addEventListener('change', function () {
          var selected = weekStartSelect.value;
          // 選択された設定を保存
          localStorage.setItem('weekStart', selected);
          // 現在の日付から新しい週の開始日を計算
          var nowDate = new Date();
          nowDate.setHours(0, 0, 0, 0);
          var offset;
          if (selected === 'monday') {
            offset = (nowDate.getDay() + 6) % 7;
          } else {
            offset = nowDate.getDay();
          }
          var startOfWeek = new Date(nowDate);
          startOfWeek.setDate(nowDate.getDate() - offset);
          window.currentWeekStartISO = toLocalISO(startOfWeek);
          updateWeekUI();
          updateCellsForCurrentWeek();
        });
      }
      // ページ全体が読み込まれた後に初期化を行います。これによりデスクトップブラウザでも
      // イベント処理と今日のハイライトが正しく機能するようになります。
      window.addEventListener('load', function () {
        // 教材リストを読み込み直す
        loadMaterials();
        // 現在の日付を基に週の開始日を計算し currentWeekStartISO を設定
        var currentDateLoad = new Date();
        currentDateLoad.setHours(0, 0, 0, 0);
        var weekStartSettingLoad = localStorage.getItem('weekStart') || 'monday';
        var dow = currentDateLoad.getDay();
        var offsetLoad = (weekStartSettingLoad === 'monday') ? ((dow + 6) % 7) : dow;
        var startLoad = new Date(currentDateLoad);
        startLoad.setDate(currentDateLoad.getDate() - offsetLoad);
        window.currentWeekStartISO = toLocalISO(startLoad);
        // UI 更新
        updateWeekUI();
        updateCellsForCurrentWeek();
        // 教材リストを画面に反映
        updateMaterialsUI();
      });
    // DOMContentLoaded 用のクロージャを削除したため閉じカッコは不要になりました。

    // 教材詳細を開く
    function openMaterialDetail(idx) {
      currentMaterialIndex = idx;
      var detailDiv = document.getElementById('materialDetail');
      var nameSpan = document.getElementById('materialNameDetail');
      var unitsInput = document.getElementById('unitsInput');
      var targetDateInput = document.getElementById('targetDateInput');
      var dailyGoalInput = document.getElementById('dailyGoalInput');
      var tocInput = document.getElementById('tocInput');
      // 名前表示
      if (nameSpan) nameSpan.textContent = materialsList[idx];
      // 詳細情報の読み込み
      var detail = materialsDetails[idx] || {};
      unitsInput.value = detail && detail.units ? detail.units : '';
      targetDateInput.value = detail && detail.targetDate ? detail.targetDate : '';
      dailyGoalInput.value = detail && detail.dailyGoal ? detail.dailyGoal : '';
      // 目次リストを入力欄に反映
      if (tocInput) {
        if (detail && detail.tocList && Array.isArray(detail.tocList)) {
          tocInput.value = detail.tocList.join('\n');
        } else {
          tocInput.value = '';
        }
      }
      detailDiv.style.display = 'block';
    }

    // 詳細保存処理
    function saveMaterialDetail() {
      if (currentMaterialIndex === null) return;
      var unitsInput = document.getElementById('unitsInput');
      var targetDateInput = document.getElementById('targetDateInput');
      var dailyGoalInput = document.getElementById('dailyGoalInput');
      var units = parseInt(unitsInput.value, 10);
      var targetDate = targetDateInput.value;
      var dailyGoal = parseInt(dailyGoalInput.value, 10);
      if (!materialsDetails[currentMaterialIndex]) materialsDetails[currentMaterialIndex] = {};
      // 目次入力欄の内容を取得し、空行を除外した配列にする
      var tocInputField = document.getElementById('tocInput');
      var tocLines = [];
      if (tocInputField && tocInputField.value) {
        tocLines = tocInputField.value.split(/\n+/).map(function (line) {
          return line.trim();
        }).filter(function (line) { return line !== ''; });
      }
      materialsDetails[currentMaterialIndex] = {
        units: isNaN(units) ? null : units,
        targetDate: targetDate || null,
        dailyGoal: isNaN(dailyGoal) ? null : dailyGoal,
        tocList: tocLines.length > 0 ? tocLines : null
      };
      // 保存
      localStorage.setItem('material-details', JSON.stringify(materialsDetails));
      // スケジュール計算
      scheduleMaterial(currentMaterialIndex);
      // 詳細パネルを閉じる
      var detailDiv = document.getElementById('materialDetail');
      detailDiv.style.display = 'none';
    }

    // 現在開いている教材をリストと詳細情報から削除する
    function deleteCurrentMaterial() {
      if (currentMaterialIndex === null) return;
      var materialName = materialsList[currentMaterialIndex] || 'この教材';
      if (!confirm(materialName + 'を削除しますか？\nカレンダーに記入済みの予定は残ります。')) {
        return;
      }
      materialsList.splice(currentMaterialIndex, 1);
      materialsDetails.splice(currentMaterialIndex, 1);
      localStorage.setItem('materials-list', JSON.stringify(materialsList));
      localStorage.setItem('material-details', JSON.stringify(materialsDetails));
      currentMaterialIndex = null;
      updateMaterialsUI();
      var detailDiv = document.getElementById('materialDetail');
      if (detailDiv) detailDiv.style.display = 'none';
    }

    // 指定した教材（列）の予習欄の記入を全て削除する。再スケジュール時に古い記入が残らないようにする。
    function clearMaterialPrepCells(idx) {
      var pattern = new RegExp('^\\d{4}-\\d{2}-\\d{2}-sub' + (idx + 1) + '-prep$');
      var keysToRemove = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && pattern.test(k)) keysToRemove.push(k);
      }
      keysToRemove.forEach(function (k) { localStorage.removeItem(k); });
    }

    // 教材のスケジュールを計算しカレンダーに追加
    function scheduleMaterial(idx) {
      var detail = materialsDetails[idx];
      if (!detail) return;
      // 既存の割り当てを削除してから新しい内容で置き換える
      clearMaterialPrepCells(idx);
      // もし目次リストが存在する場合は章タイトルごとにスケジュールする
      var tasks = detail.tocList;
      if (tasks && Array.isArray(tasks) && tasks.length > 0) {
        // 開始日: 今日
        var start = new Date();
        start.setHours(0, 0, 0, 0);
        var colIndex = idx;
        // 期日がある場合は目次を期日までの日数で均等割り当て
        if (detail.targetDate) {
          var end = new Date(detail.targetDate);
          end.setHours(0, 0, 0, 0);
          var days = Math.floor((end - start) / 86400000) + 1;
          if (days < 1) days = 1;
          // dailyGoal が指定されていればそれを単位数とみなす
          var tasksPerDay;
          var dGoal = parseInt(detail.dailyGoal, 10);
          if (!isNaN(dGoal) && dGoal > 0) {
            tasksPerDay = dGoal;
          } else {
            tasksPerDay = Math.ceil(tasks.length / days);
          }
          var taskIndex = 0;
          for (var day = 0; day < days && taskIndex < tasks.length; day++) {
            var current = new Date(start);
            current.setDate(start.getDate() + day);
            var iso = toLocalISO(current);
            var subTasks = tasks.slice(taskIndex, taskIndex + tasksPerDay);
            taskIndex += tasksPerDay;
            var content = subTasks.join('\n');
            var key = iso + '-sub' + (colIndex + 1) + '-prep';
            localStorage.setItem(key, content);
          }
        } else {
          // 期日がない場合は毎日順番に dailyGoal または1単位ずつ割り当て
          var daily = parseInt(detail.dailyGoal, 10);
          var tasksPerDay2 = (!isNaN(daily) && daily > 0) ? daily : 1;
          var taskIdx = 0;
          var dayOffset = 0;
          while (taskIdx < tasks.length) {
            var currentDay = new Date(start);
            currentDay.setDate(start.getDate() + dayOffset);
            var iso2 = toLocalISO(currentDay);
            var sub = tasks.slice(taskIdx, taskIdx + tasksPerDay2);
            taskIdx += tasksPerDay2;
            var content2 = sub.join('\n');
            var key2 = iso2 + '-sub' + (colIndex + 1) + '-prep';
            localStorage.setItem(key2, content2);
            dayOffset++;
          }
        }
        // スケジュール後、表示更新
        updateCellsForCurrentWeek();
        return;
      }
      // --- 目次がない場合は数値単位ベースのスケジュール処理 ---
      var unitsTotal = parseInt(detail.units, 10);
      var targetDateStr = detail.targetDate;
      var dailyGoal = parseInt(detail.dailyGoal, 10);
      // unitsTotal と期日が未指定の場合は何もしない
      if (!unitsTotal || !targetDateStr) {
        updateCellsForCurrentWeek();
        return;
      }
      // 開始日と終了日を設定（時間を 00:00:00 に）
      var startDate = new Date();
      startDate.setHours(0, 0, 0, 0);
      var endDate = new Date(targetDateStr);
      endDate.setHours(0, 0, 0, 0);
      // 期日までの日数を計算（最低1日）
      var dayCount = Math.floor((endDate - startDate) / 86400000) + 1;
      if (dayCount < 1) dayCount = 1;
      // 1 から unitsTotal までの番号リストを生成
      var tasksArray = [];
      for (var iNum = 1; iNum <= unitsTotal; iNum++) {
        tasksArray.push(iNum);
      }
      // 1日あたりに割り当てる単位数を決定
      var tasksPerDay;
      if (!isNaN(dailyGoal) && dailyGoal > 0) {
        tasksPerDay = dailyGoal;
      } else {
        tasksPerDay = Math.ceil(unitsTotal / dayCount);
      }
      // 各日に割り当てて保存
      var dayIndex = 0;
      for (var startIdx = 0; startIdx < tasksArray.length; startIdx += tasksPerDay) {
        var currDate = new Date(startDate);
        currDate.setDate(startDate.getDate() + dayIndex);
        var isoDate = toLocalISO(currDate);
        // 当日のタスクグループ
        var group = tasksArray.slice(startIdx, startIdx + tasksPerDay);
        if (group.length === 0) break;
        var contentStr = group.join(', ');
        var key3 = isoDate + '-sub' + (idx + 1) + '-prep';
        localStorage.setItem(key3, contentStr);
        dayIndex++;
      }
      // スケジュール後に表示を更新
      updateCellsForCurrentWeek();
    }

    // 現在週のセル内容を更新
    function updateCellsForCurrentWeek() {
      document.querySelectorAll('.section').forEach(function (section) {
        var key = section.getAttribute('data-key');
        var saved = localStorage.getItem(key);
        if (saved) {
          section.innerText = saved;
        } else {
          section.innerText = '';
        }
      });
    }

    // 週の表示を更新する関数。現在の週開始日 (window.currentWeekStartISO) を基準にラベルや data-key を更新します。
    function updateWeekUI() {
      var startDate = parseISOToDate(window.currentWeekStartISO);
      // 今日の日付を取得し、ISO形式文字列にしておく
      var todayDate = new Date();
      todayDate.setHours(0, 0, 0, 0);
      var todayISO = toLocalISO(todayDate);
      rows.forEach(function (row, idx) {
        var date = new Date(startDate);
        date.setDate(startDate.getDate() + idx);
        var iso = toLocalISO(date);
        var display = (date.getMonth() + 1) + '/' + date.getDate();
        var dayName = dayNames[date.getDay()];
        var labelCell = row.querySelector('th.row-label');
        if (labelCell) {
          labelCell.textContent = dayName + ' ' + display;
          // 今日の日付行の場合はクラスを追加して強調
          if (iso === todayISO) {
            labelCell.classList.add('today');
          } else {
            labelCell.classList.remove('today');
          }
          if (date.getDay() === 0 || holidays2026.has(iso)) {
            labelCell.style.color = 'red';
          } else if (date.getDay() === 6) {
            labelCell.style.color = 'blue';
          } else {
            labelCell.style.color = '';
          }
        }
        // 各科目セルの data-key を更新
        var cells = row.querySelectorAll('td.cell');
        cells.forEach(function (cell, cellIdx) {
          var subNum = cellIdx + 1;
          var prepSection = cell.querySelector('.prep');
          var reviewSection = cell.querySelector('.review');
          if (prepSection) prepSection.setAttribute('data-key', iso + '-sub' + subNum + '-prep');
          if (reviewSection) reviewSection.setAttribute('data-key', iso + '-sub' + subNum + '-review');
        });
      });
      // 一週間の振り返り欄の読み込みと保存イベントの更新
      var weeklySummaryEl = document.getElementById('weeklySummary');
      if (weeklySummaryEl) {
        var summaryKey = 'weekly-summary-' + window.currentWeekStartISO;
        var savedSummary = localStorage.getItem(summaryKey);
        weeklySummaryEl.innerText = savedSummary ? savedSummary : '';
        weeklySummaryEl.oninput = function () {
          localStorage.setItem(summaryKey, weeklySummaryEl.innerText);
        };
      }
      refreshStatusRows();
    }

    // 各セルの完了状況（○×）表示を、保存済みの状態に合わせて更新します。
    function refreshStatusRows() {
      document.querySelectorAll('td.cell').forEach(function (cell) {
        var prep = cell.querySelector('.prep');
        var statusRow = cell.querySelector('.status-row');
        if (!prep || !statusRow) return;
        var key = prep.getAttribute('data-key') || '';
        var m = key.match(/^(\d{4}-\d{2}-\d{2})-sub(\d+)-prep$/);
        if (!m) return;
        var status = localStorage.getItem(m[1] + '-sub' + m[2] + '-status');
        statusRow.textContent = status === 'circle' ? '○' : status === 'cross' ? '✕' : '';
        statusRow.className = 'status-row' + (status ? ' status-' + status : '');
      });
    }

    // 「今日やること」タブの表示内容を更新します。
    function updateTodayView() {
      var dateLabelEl = document.getElementById('todayDateLabel');
      var listEl = document.getElementById('todayTaskList');
      if (!listEl) return;
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var todayISO = toLocalISO(today);
      var monthDay = (today.getMonth() + 1) + '月' + today.getDate() + '日';
      var youbi = dayNames[today.getDay()] + '曜日';
      if (dateLabelEl) dateLabelEl.textContent = monthDay + youbi + 'の今日やること';

      listEl.innerHTML = '';
      var hasTask = false;
      // 科目1〜7の予習欄から、今日の内容が入っているものをリスト表示する（8列目は感想・振り返り欄のため対象外）
      for (let n = 1; n <= 7; n++) {
        var headerCell = document.querySelector('.header-cell[data-header="sub' + n + '"]');
        var label = headerCell ? headerCell.textContent.trim() : ('科目' + n);
        var content = localStorage.getItem(todayISO + '-sub' + n + '-prep');
        if (!content || !content.trim()) continue;
        hasTask = true;
        var oneLine = content.trim().split(/\n+/).join('、');
        let statusKey = todayISO + '-sub' + n + '-status';
        let currentStatus = localStorage.getItem(statusKey);

        var li = document.createElement('li');
        var textSpan = document.createElement('span');
        textSpan.className = 'today-task-text';
        textSpan.textContent = label + '：' + oneLine;
        li.appendChild(textSpan);

        var btnGroup = document.createElement('span');
        btnGroup.className = 'today-task-buttons';
        ['circle', 'cross'].forEach(function (statusVal) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = statusVal === 'circle' ? '○' : '✕';
          btn.className = 'status-btn ' + statusVal + (currentStatus === statusVal ? ' selected' : '');
          btn.addEventListener('click', function () {
            var existing = localStorage.getItem(statusKey);
            if (existing === statusVal) {
              localStorage.removeItem(statusKey);
            } else {
              localStorage.setItem(statusKey, statusVal);
            }
            updateTodayView();
            refreshStatusRows();
          });
          btnGroup.appendChild(btn);
        });
        li.appendChild(btnGroup);
        listEl.appendChild(li);
      }
      if (!hasTask) {
        var emptyLi = document.createElement('li');
        emptyLi.className = 'today-empty';
        emptyLi.textContent = '今日やることは特にありません。';
        listEl.appendChild(emptyLi);
      }
    }

    // 教材を日単位でスケジュールします。dailyGoalがなければ1単位とみなします。
    function scheduleMaterialDaily(idx) {
      var detail = materialsDetails[idx];
      if (!detail) return;
      // 既存の割り当てを削除してから新しい内容で置き換える
      clearMaterialPrepCells(idx);
      // 目次リストがある場合は章タイトルを日毎に割り当て
      var tasks = detail.tocList;
      if (tasks && Array.isArray(tasks) && tasks.length > 0) {
        var start = new Date();
        start.setHours(0, 0, 0, 0);
        var daily = parseInt(detail.dailyGoal, 10);
        var tasksPerDay = (!isNaN(daily) && daily > 0) ? daily : 1;
        var taskIndex = 0;
        var dayOffset = 0;
        var colIdx = idx;
        while (taskIndex < tasks.length) {
          var current = new Date(start);
          current.setDate(start.getDate() + dayOffset);
          var iso = toLocalISO(current);
          var subTasks = tasks.slice(taskIndex, taskIndex + tasksPerDay);
          taskIndex += tasksPerDay;
          var content = subTasks.join('\n');
          var key = iso + '-sub' + (colIdx + 1) + '-prep';
          localStorage.setItem(key, content);
          dayOffset += 1;
        }
        // 詳細パネルを閉じる
        var ddiv = document.getElementById('materialDetail');
        if (ddiv) ddiv.style.display = 'none';
        updateCellsForCurrentWeek();
        return;
      }
      // --- 目次がない場合は数値単位ベースで日単位割り当て ---
      var unitsTotal = parseInt(detail.units, 10);
      // If there is no valid number of units, nothing to schedule
      if (!unitsTotal || unitsTotal <= 0) return;
      var dailyGoal = parseInt(detail.dailyGoal, 10);
      // Default to 1 unit per day when daily goal is missing or invalid
      if (isNaN(dailyGoal) || dailyGoal <= 0) {
        dailyGoal = 1;
      }
      // Create an array of unit numbers [1, 2, ..., unitsTotal]
      var tasksArray = [];
      for (var num = 1; num <= unitsTotal; num++) {
        tasksArray.push(num);
      }
      var startDate = new Date();
      startDate.setHours(0, 0, 0, 0);
      var columnIndex = idx;
      var offset = 0;
      // Group sequential units by dailyGoal and assign each group to consecutive days
      for (var s = 0; s < tasksArray.length; s += dailyGoal) {
        var currentDate = new Date(startDate);
        currentDate.setDate(startDate.getDate() + offset);
        var isoStr = toLocalISO(currentDate);
        var group = tasksArray.slice(s, s + dailyGoal);
        if (group.length === 0) break;
        var contentStr = group.join(', ');
        var key = isoStr + '-sub' + (columnIndex + 1) + '-prep';
        localStorage.setItem(key, contentStr);
        offset++;
      }
      var detDiv = document.getElementById('materialDetail');
      if (detDiv) detDiv.style.display = 'none';
      updateCellsForCurrentWeek();
    }
    // リセットボタン
    document.getElementById('resetButton').addEventListener('click', function () {
      if (confirm('本当にこの週間の記録を削除しますか？')) {
        // 全てのキーに対して削除
        document.querySelectorAll('.section').forEach(function (section) {
          var key = section.getAttribute('data-key');
          localStorage.removeItem(key);
          section.innerText = '';
        });
        // 完了状況（○×）も現在週の分を削除
        document.querySelectorAll('td.cell').forEach(function (cell) {
          var prep = cell.querySelector('.prep');
          if (!prep) return;
          var key = prep.getAttribute('data-key') || '';
          var m = key.match(/^(\d{4}-\d{2}-\d{2})-sub(\d+)-prep$/);
          if (m) localStorage.removeItem(m[1] + '-sub' + m[2] + '-status');
        });
        refreshStatusRows();
        alert('記録をリセットしました。');
      }
    });
  </script>
